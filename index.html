<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮膚科英会話トレーニング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --cream: #faf7f2;
    --dark: #1a1612;
    --brown: #6b4f3a;
    --accent: #c17f3e;
    --accent-light: #e8c99a;
    --teal: #2d6b6b;
    --teal-light: #a8d4d4;
    --surface: #f0ebe2;
    --border: #d4c8b8;
    --patient-bg: #edf6f6;
    --doctor-bg: #fff9f2;
    --green: #3a6b4f;
    --red: #8b3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--dark);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  header h1 span {
    color: var(--accent-light);
    font-style: italic;
  }

  .level-badge {
    background: var(--accent);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* ===== MAIN LAYOUT ===== */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }

  .sidebar h2 {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--brown);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .scenario-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 20px;
  }

  .scenario-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 8px 12px;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.78rem;
    color: var(--dark);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.4;
  }

  .scenario-btn:hover {
    background: var(--cream);
    border-color: var(--border);
  }

  .scenario-btn.active {
    background: var(--dark);
    color: var(--cream);
    border-color: var(--dark);
  }

  .scenario-btn .en {
    font-size: 0.67rem;
    opacity: 0.6;
    font-family: 'DM Mono', monospace;
    display: block;
    margin-top: 2px;
  }

  .scenario-btn .icon {
    font-size: 1rem;
    flex-shrink: 0;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ===== CHAT AREA ===== */
  .chat-section {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scenario-header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .scenario-header h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--dark);
  }

  .scenario-header p {
    font-size: 0.75rem;
    color: var(--brown);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--brown);
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .btn-restart:hover {
    background: var(--surface);
    border-color: var(--brown);
  }

  .btn-tts-toggle {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: "DM Mono", monospace;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-tts-toggle.off {
    background: transparent;
    color: var(--brown);
    border: 1px solid var(--border);
  }

  .btn-tts-toggle:hover { opacity: 0.85; }

  .tts-speaking .avatar.p-avatar {
    animation: speak-pulse 0.6s infinite alternate;
  }

  @keyframes speak-pulse {
    from { box-shadow: 0 0 0 0 rgba(45,107,107,0.4); transform: scale(1); }
    to   { box-shadow: 0 0 0 8px rgba(45,107,107,0); transform: scale(1.12); }
  }

  /* ===== MESSAGES ===== */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
    max-width: 85%;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.patient { align-self: flex-start; }
  .message.doctor { align-self: flex-end; flex-direction: row-reverse; }
  .message.system { align-self: center; max-width: 100%; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .avatar.p-avatar { background: var(--teal-light); }
  .avatar.d-avatar { background: var(--accent-light); }

  .bubble {
    border-radius: 12px;
    padding: 12px 16px;
    line-height: 1.6;
  }

  .message.patient .bubble {
    background: var(--patient-bg);
    border: 1px solid #c2e0e0;
    border-top-left-radius: 2px;
  }

  .message.doctor .bubble {
    background: var(--doctor-bg);
    border: 1px solid var(--border);
    border-top-right-radius: 2px;
  }

  .bubble .ja {
    font-size: 0.8rem;
    color: var(--brown);
    margin-bottom: 4px;
    font-style: italic;
  }

  .bubble .en {
    font-size: 0.92rem;
    color: var(--dark);
  }

  .bubble .role-label {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-style: normal;
  }

  .patient .role-label { color: var(--teal); }
  .doctor .role-label { color: var(--accent); }

  /* System messages */
  .system-msg {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 0.8rem;
    color: var(--brown);
    text-align: center;
    font-family: 'DM Mono', monospace;
  }

  /* Feedback bubble */
  .feedback-bubble {
    background: #f0f8f4;
    border: 1px solid #b8d9c8;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.82rem;
    line-height: 1.6;
    align-self: flex-end;
    max-width: 85%;
    animation: slideIn 0.3s ease;
  }

  .feedback-bubble .fb-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }

  .feedback-bubble .fb-model {
    color: var(--teal);
    font-weight: 600;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #c8e8d8;
  }

  .feedback-bubble .fb-comment {
    color: var(--dark);
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    border-top: 1px solid var(--border);
    background: white;
    padding: 16px 24px;
  }

  .input-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    color: var(--brown);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    color: var(--dark);
    background: var(--cream);
    resize: none;
    min-height: 60px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-send {
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s;
    height: 60px;
    white-space: nowrap;
  }

  .btn-send:hover:not(:disabled) { background: var(--brown); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

  .hint-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .hint-text {
    font-size: 0.7rem;
    color: var(--brown);
    font-family: 'DM Mono', monospace;
  }

  .btn-hint {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--teal);
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .btn-hint:hover { background: var(--teal-light); border-color: var(--teal); }

  .mic-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .btn-mic {
    background: transparent;
    border: 2px solid var(--border);
    border-radius: 10px;
    width: 60px;
    height: 60px;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-mic:hover:not(:disabled) { border-color: var(--teal); background: var(--teal-light); }
  .btn-mic:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-mic.recording {
    border-color: #c0392b;
    background: #fdecea;
    animation: pulse-mic 1s infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
  }

  .mic-label {
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    color: var(--brown);
    white-space: nowrap;
  }

  .mic-label.recording { color: #c0392b; font-weight: bold; }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 8px 0;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  /* ===== WELCOME ===== */
  .welcome {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .welcome-card {
    text-align: center;
    max-width: 440px;
  }

  .welcome-card .big-icon { font-size: 3rem; margin-bottom: 16px; }

  .welcome-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: var(--dark);
  }

  .welcome-card p {
    font-size: 0.85rem;
    color: var(--brown);
    line-height: 1.7;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Complete banner */
  .complete-banner {
    background: linear-gradient(135deg, var(--green), var(--teal));
    color: white;
    border-radius: 10px;
    padding: 16px 20px;
    text-align: center;
    align-self: center;
    animation: slideIn 0.4s ease;
    max-width: 85%;
  }

  .complete-banner h4 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 4px;
  }

  .complete-banner p {
    font-size: 0.8rem;
    opacity: 0.85;
  }
</style>
</head>
<body>

<header>
  <h1>🏥 皮膚科英会話 <span>Training Simulator</span></h1>
  <span class="level-badge" id="progressLabel">0 / 22 シナリオ</span>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>📋 シナリオ選択</h2>
    <ul class="scenario-list" id="scenarioList"></ul>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </aside>

  <!-- CHAT -->
  <section class="chat-section" id="chatSection">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-card">
        <div class="big-icon">🩺</div>
        <h2>外来英会話シミュレーター</h2>
        <p>左のメニューからシナリオを選んでください。<br>患者役のAIと英語で問診を行う練習ができます。<br><br>
        患者の訴えを読んで、医師として英語で応答してください。AIがフィードバックを提供します。</p>
      </div>
    </div>

    <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
      <div class="scenario-header">
        <div>
          <h3 id="scenarioTitle">-</h3>
          <p id="scenarioSubtitle">-</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-tts-toggle" id="ttsToggle" onclick="toggleTTS()" title="患者の音声読み上げ ON/OFF">🔊 音声 ON</button>
          <button class="btn-restart" onclick="restartScenario()">↺ やり直す</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area" id="inputArea">
        <div class="input-label">🩺 あなた（医師）の応答 — Doctor's response</div>
        <div class="input-row">
          <textarea id="doctorInput" placeholder="英語で応答してください... (Shift+Enter or マイクで音声入力)" rows="2"></textarea>
          <div class="mic-wrap">
            <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
            <span class="mic-label" id="micLabel">音声入力</span>
          </div>
          <button class="btn-send" id="sendBtn" onclick="sendDoctorResponse()">送信<br>Send</button>
        </div>
        <div class="hint-row">
          <span class="hint-text">💡 自由に英語で応答してください。正解は一つではありません。</span>
          <button class="btn-hint" onclick="showHint()">ヒント表示</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
const SCENARIOS = [
  {
    id: "reception_pre",
    title: "受付での会話（診察前）",
    en: "At the reception desk — Pre-consultation",
    icon: "🗂️",
    category: "reception",
    exchanges: [
      { role: "patient", ja: "初めてですが…．", en: "Umm, this is my first time here." },
      { role: "doctor_turn", hint: "初診の手続きを案内してください。（登録用紙・健康保険証・問診票）", modelAnswer: "Please fill out this registration form with your full name, address, and phone number. I'll also need your health insurance card. While we make up your file, could you fill in this medical questionnaire?" },
      { role: "patient", ja: "わかりました。混んでいますか？", en: "OK. Is it very busy today?" },
      { role: "doctor_turn", hint: "待ち時間を伝えてください。", modelAnswer: "No, not really. It should be about a 20-minute wait." }
    ]
  },
  {
    id: "atopic_child",
    title: "アトピー性皮膚炎（乳幼児）",
    en: "Atopic dermatitis — Infants and Toddlers",
    icon: "🧒",
    category: "disease",
    exchanges: [
      { role: "patient", ja: "最近体中を痒がって、皮膚をかきこわします。", en: "She seems to be itchy all over, and she scratches her skin really hard." },
      { role: "doctor_turn", hint: "家族歴を聞いてください（アレルギー疾患）", modelAnswer: "Does anyone in your family have a history of allergies?" },
      { role: "patient", ja: "夫が小児喘息、私はアレルギー性鼻炎です。", en: "My husband had asthma when he was a child, and I have allergic rhinitis." },
      { role: "doctor_turn", hint: "診断を告げ、治療方針（塗り薬・日常ケア）を説明してください", modelAnswer: "It looks as though your daughter has atopic dermatitis. Most babies grow out of it. It's important to make sure to apply ointment properly on a daily basis." },
      { role: "patient", ja: "原因は食べ物ですか？", en: "Was it something she ate?" },
      { role: "doctor_turn", hint: "食物アレルギーの可能性・検査の必要性を説明してください", modelAnswer: "This may or may not be related to your baby's diet. We can't really know for sure without an allergy test, so please don't decide yourself what foods to stop giving her." },
      { role: "patient", ja: "ステロイド外用薬の副作用は心配ないですか？", en: "Are there any side effects with the steroid cream that I should be worried about?" },
      { role: "doctor_turn", hint: "指示通り使用すれば副作用の心配はないと伝えてください", modelAnswer: "There's no need to worry about side effects if you only apply it to the affected areas as instructed and you continue bringing her in for regular visits." }
    ]
  },
  {
    id: "atopic_adult",
    title: "アトピー性皮膚炎（成人）",
    en: "Atopic dermatitis — Adults",
    icon: "👨",
    category: "disease",
    exchanges: [
      { role: "patient", ja: "こどもの頃からアトピー性皮膚炎があり、最近さらにひどくなりました。", en: "I've had atopic dermatitis since I was a child, and it's gotten much worse recently." },
      { role: "doctor_turn", hint: "現在使用中の薬を確認してください", modelAnswer: "Do you know the name of the medications you're currently using?" },
      { role: "patient", ja: "保湿薬とタクロリムス軟膏をもらっていましたが、1ヶ月前に切らしてしまい、かゆみで夜も眠れません。", en: "I was using a moisturizer and tacrolimus ointment, but I ran out about a month ago. Now it's so itchy I can't sleep at night." },
      { role: "doctor_turn", hint: "悪化を伝え、治療計画（薬・血液検査・再診）を説明してください", modelAnswer: "It's gotten really bad. Be sure to properly use the medication I'm giving you today. We'll add some oral antihistamines and see how things are after a week. I also think it would be better to have a blood test — could you provide consent for that?" }
    ]
  },
  {
    id: "seborrheic",
    title: "脂漏性皮膚炎",
    en: "Seborrheic dermatitis",
    icon: "💆",
    category: "disease",
    exchanges: [
      { role: "patient", ja: "最近頭が痒くフケが多いです。", en: "Recently, my head's been itchy, and I've been noticing a lot of dandruff." },
      { role: "doctor_turn", hint: "診断を伝え、原因と治療（ステロイドローション）を説明してください", modelAnswer: "Your scalp is red. This is seborrheic dermatitis. It's related to certain fungi that prefer oily areas of the skin. I'm going to give you a steroid lotion to use twice a day." },
      { role: "patient", ja: "洗髪はどうしたらいいでしょうか。", en: "How should I wash my hair?" },
      { role: "doctor_turn", hint: "毎日シャンプーすること、再発に注意することを伝えてください", modelAnswer: "Please wash your hair every day. We can recommend a medicated shampoo. This condition often recurs after it seems to have disappeared, so if it happens again, please come back to see us right away." }
    ]
  },
  {
    id: "contact_dermatitis",
    title: "接触皮膚炎",
    en: "Contact dermatitis",
    icon: "🤲",
    category: "disease",
    exchanges: [
      { role: "patient", ja: "首まわりの皮膚が赤くなって痒いです。", en: "The skin around my neck is red and itchy." },

// State
let currentScenarioId = null;
let currentExchangeIndex = 0;
let conversationHistory = [];
let completedScenarios = new Set();

// Init
function init() {
  renderSidebarList();
  updateProgress();
}

function renderSidebarList() {
  const list = document.getElementById('scenarioList');
  list.innerHTML = '';
  SCENARIOS.forEach(s => {
    const li = document.createElement('li');
    const done = completedScenarios.has(s.id);
    li.innerHTML = `<button class="scenario-btn ${s.id === currentScenarioId ? 'active' : ''}" onclick="loadScenario('${s.id}')">
      <span class="icon">${done ? '✅' : s.icon}</span>
      <span>${s.title}<span class="en">${s.en}</span></span>
    </button>`;
    list.appendChild(li);
  });
}

function updateProgress() {
  const pct = (completedScenarios.size / SCENARIOS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completedScenarios.size} / ${SCENARIOS.length} シナリオ`;
}

function loadScenario(id) {
  currentScenarioId = id;
  currentExchangeIndex = 0;
  conversationHistory = [];
  
  const s = SCENARIOS.find(x => x.id === id);
  document.getElementById('welcomeScreen').style.display = 'none';
  const chat = document.getElementById('activeChat');
  chat.style.display = 'flex';
  document.getElementById('scenarioTitle').textContent = s.title;
  document.getElementById('scenarioSubtitle').textContent = s.en;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('doctorInput').value = '';
  document.getElementById('inputArea').style.display = 'block';
  
  renderSidebarList();
  
  // Show start system message
  addSystemMessage(`シナリオ開始：${s.title}\n患者の訴えを聞いて、英語で応答してください。`);
  
  // Show first patient message
  playNextExchange();
}

function restartScenario() {
  if (currentScenarioId) loadScenario(currentScenarioId);
}

function playNextExchange() {
  const s = SCENARIOS.find(x => x.id === currentScenarioId);
  if (!s) return;
  
  while (currentExchangeIndex < s.exchanges.length) {
    const ex = s.exchanges[currentExchangeIndex];
    
    if (ex.role === 'patient') {
      addPatientMessage(ex.ja, ex.en);
      currentExchangeIndex++;
      
      // Check if next is a doctor turn
      if (currentExchangeIndex < s.exchanges.length && s.exchanges[currentExchangeIndex].role === 'doctor_turn') {
        // Enable input for doctor
        enableInput();
        return;
      }
    } else if (ex.role === 'doctor_turn') {
      // Should be handled by sendDoctorResponse
      enableInput();
      return;
    } else {
      currentExchangeIndex++;
    }
  }
  
  // Scenario complete
  showComplete();
}

function enableInput() {
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('doctorInput').disabled = false;
  document.getElementById('doctorInput').focus();
}

function disableInput() {
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('doctorInput').disabled = true;
}

function addPatientMessage(ja, en) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message patient';
  const msgId = 'pmsg_' + Date.now();
  div.id = msgId;
  div.innerHTML = `
    <div class="avatar p-avatar">🧑</div>
    <div class="bubble">
      <div class="role-label" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Patient 患者</span>
        <button onclick="speakText(this, "${en.replace(/"/g,'&quot;')}")" style="background:none;border:none;cursor:pointer;font-size:1rem;opacity:0.6;padding:0 2px;" title="音声で読み上げ">🔈</button>
      </div>
      <div class="ja">${ja}</div>
      <div class="en">${en}</div>
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  // Auto-speak if TTS is on
  if (ttsEnabled) {
    setTimeout(() => speakText(div.querySelector('button'), en, div), 200);
  }
}

function addDoctorMessage(en) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message doctor';
  div.innerHTML = `
    <div class="avatar d-avatar">🩺</div>
    <div class="bubble">
      <div class="role-label">You 医師</div>
      <div class="en">${en}</div>
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function addSystemMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `<div class="system-msg">${text.replace(/\n/g, '<br>')}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function showHint() {
  const s = SCENARIOS.find(x => x.id === currentScenarioId);
  if (!s) return;
  const ex = s.exchanges[currentExchangeIndex];
  if (!ex || ex.role !== 'doctor_turn') return;
  addSystemMessage(`💡 ヒント: ${ex.hint}`);
}

async function sendDoctorResponse() {
  const input = document.getElementById('doctorInput');
  const text = input.value.trim();
  if (!text) return;

  const s = SCENARIOS.find(x => x.id === currentScenarioId);
  const ex = s.exchanges[currentExchangeIndex];

  addDoctorMessage(text);
  input.value = '';
  disableInput();
  currentExchangeIndex++;

  // Show model answer immediately (no API wait)
  const modelText = ex?.modelAnswer || '';
  const fbId = 'fb_' + Date.now();
  const msgs2 = document.getElementById('messages');
  const fb = document.createElement('div');
  fb.className = 'feedback-bubble';
  fb.id = fbId;
  fb.innerHTML = `
    <div class="fb-header">📖 模範例</div>
    <div class="fb-model" style="margin-top:0">${modelText}</div>
    <div class="fb-ai-loading" style="margin-top:8px;font-size:0.72rem;color:#888;font-family:'DM Mono',monospace;">🤖 AI評価を取得中...</div>`;
  msgs2.appendChild(fb);
  scrollToBottom();

  // Continue conversation immediately
  playNextExchange();

  // Fetch AI feedback in background (non-blocking)
  fetchFeedbackAsync(text, ex, s, fbId);
}

async function fetchFeedbackAsync(doctorText, ex, s, fbId) {
  try {
    const systemPrompt = `You are a concise Japanese dermatology English coach. Evaluate the doctor's response briefly.

Scenario: "${s.title}"
Patient said: "${ex ? s.exchanges.find(e=>e===ex)?.en || '' : ''}"
Hint: ${ex?.hint || ''}

Reply ONLY in this exact format (be very brief):
[評価]: (1 sentence in Japanese)
[改善点]: (1 phrase tip in Japanese, or "問題なし")
[模範例]: ${ex?.modelAnswer || ''}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        system: systemPrompt,
        messages: [{ role: "user", content: `医師: "${doctorText}"` }]
      })
    });

    const data = await response.json();
    const feedback = data.content?.[0]?.text || '';

    const evalMatch = feedback.match(/\[評価\]:\s*(.*?)(?=\[改善点\]|\[模範例\]|$)/s);
    const improveMatch = feedback.match(/\[改善点\]:\s*(.*?)(?=\[模範例\]|$)/s);

    const evalText = evalMatch ? evalMatch[1].trim() : '';
    const improveText = improveMatch ? improveMatch[1].trim() : '';

    // Update the existing feedback bubble
    const fbEl = document.getElementById(fbId);
    if (!fbEl) return;
    const loadingEl = fbEl.querySelector('.fb-ai-loading');
    if (loadingEl) {
      loadingEl.outerHTML = `
        ${evalText ? `<div class="fb-comment" style="margin-top:8px;padding-top:8px;border-top:1px solid #c8e8d8;">📝 ${evalText}</div>` : ''}
        ${improveText && improveText !== '問題なし' ? `<div class="fb-comment" style="margin-top:4px;">✏️ ${improveText}</div>` : ''}`;
      scrollToBottom();
    }
  } catch(e) {
    const fbEl = document.getElementById(fbId);
    if (fbEl) {
      const loadingEl = fbEl.querySelector('.fb-ai-loading');
      if (loadingEl) loadingEl.remove();
    }
  }
}

function showComplete() {
  completedScenarios.add(currentScenarioId);
  renderSidebarList();
  updateProgress();
  
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `<div class="complete-banner">
    <h4>🎉 シナリオ完了！</h4>
    <p>このシナリオを練習できました。左のメニューから次のシナリオを選んでください。</p>
  </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  
  document.getElementById('inputArea').style.display = 'none';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.target.id === 'doctorInput' && e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    sendDoctorResponse();
  }
});

init();

// ===== TEXT TO SPEECH =====
let ttsEnabled = true;
let currentUtterance = null;

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('ttsToggle');
  if (ttsEnabled) {
    btn.textContent = '🔊 音声 ON';
    btn.classList.remove('off');
  } else {
    btn.textContent = '🔇 音声 OFF';
    btn.classList.add('off');
    if (currentUtterance) window.speechSynthesis.cancel();
  }
}

function speakText(btn, text, msgEl) {
  // Cancel any current speech
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.88;
  utterance.pitch = 1.05;

  // Try to pick a natural female English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && /samantha|zira|karen|moira|victoria|female/i.test(v.name))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;

  currentUtterance = utterance;

  if (btn) btn.textContent = '🔉';
  if (msgEl) msgEl.classList.add('tts-speaking');

  utterance.onend = () => {
    currentUtterance = null;
    if (btn) btn.textContent = '🔈';
    if (msgEl) msgEl.classList.remove('tts-speaking');
  };
  utterance.onerror = () => {
    if (btn) btn.textContent = '🔈';
    if (msgEl) msgEl.classList.remove('tts-speaking');
  };

  window.speechSynthesis.speak(utterance);
}

// Preload voices
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ===== SPEECH RECOGNITION =====
let recognition = null;
let isRecording = false;

function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('micBtn').disabled = true;
    document.getElementById('micLabel').textContent = '非対応';
    return null;
  }

  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.continuous = true;
  rec.interimResults = true;

  let finalTranscript = '';

  rec.onstart = () => {
    isRecording = true;
    finalTranscript = document.getElementById('doctorInput').value;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹️';
    document.getElementById('micLabel').textContent = '録音中...';
    document.getElementById('micLabel').classList.add('recording');
  };

  rec.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript + ' ';
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    document.getElementById('doctorInput').value = finalTranscript + interim;
  };

  rec.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micLabel').textContent = '音声入力';
    document.getElementById('micLabel').classList.remove('recording');
    // Trim trailing space
    const ta = document.getElementById('doctorInput');
    ta.value = ta.value.trim();
  };

  rec.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micLabel').textContent = e.error === 'not-allowed' ? '許可必要' : 'エラー';
    document.getElementById('micLabel').classList.remove('recording');
  };

  return rec;
}

function toggleMic() {
  if (!recognition) recognition = initSpeechRecognition();
  if (!recognition) return;

  if (isRecording) {
    recognition.stop();
  } else {
    try {
      recognition.start();
    } catch(e) {
      recognition = initSpeechRecognition();
      recognition && recognition.start();
    }
  }
}

// Also stop mic when send is triggered
const _origSend = sendDoctorResponse;
sendDoctorResponse = async function() {
  if (isRecording && recognition) recognition.stop();
  await new Promise(r => setTimeout(r, 100)); // brief wait for final transcript
  _origSend();
};
